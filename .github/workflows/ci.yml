name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Validate skill layout
        run: |
          test -f skill/quality-ci-checks/SKILL.md
          test -f skill/quality-ci-checks/reference.md
          test -x skill/quality-ci-checks/quality/checks.sh
          test -f skill/quality-ci-checks/scripts/scaffold.sh
          test -f skill/quality-ci-checks/templates/pyproject-snippet.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install shell lint tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          SHFMT_VER=3.13.1
          curl -sSL \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VER}/shfmt_v${SHFMT_VER}_linux_amd64" \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Shell checks
        env:
          CI: true
        run: ./checks.sh
